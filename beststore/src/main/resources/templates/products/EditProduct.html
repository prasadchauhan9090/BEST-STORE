<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: #fff;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 750px;
        }

        h2 {
            font-weight: bold;
            color: #333;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn-update {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 25px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-update:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .btn-cancel {
            border-radius: 25px;
        }

        .form-label {
            font-weight: 600;
        }

        .product-img {
            border-radius: 10px;
            border: 2px solid #eee;
            padding: 5px;
            transition: 0.3s;
        }

        .product-img:hover {
            transform: scale(1.05);
        }

        .error-text {
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h2 class="text-center mb-4">✏️ Edit Product</h2>

    <form method="post"
          enctype="multipart/form-data"
          th:action="@{/products/edit/{id}(id=${product.id})}"
          th:object="${productDto}">

        <!-- ID -->
        <div class="mb-3">
            <label class="form-label">Product ID</label>
            <input readonly class="form-control" th:value="${product.id}">
        </div>

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input class="form-control" th:field="*{name}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
        </div>

        <!-- Brand -->
        <div class="mb-3">
            <label class="form-label">Brand</label>
            <input class="form-control" th:field="*{brand}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('brand')}"
                 th:errors="*{brand}"></div>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" th:field="*{category}">
                <option value="">-- Select Category --</option>
                <option value="Phones">Phones</option>
                <option value="Computers">Computers</option>
                <option value="Accessories">Accessories</option>
            </select>
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('category')}"
                 th:errors="*{category}"></div>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input class="form-control" type="number" th:field="*{price}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}"></div>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
        </div>

        <!-- Current Image -->
        <div class="mb-3 text-center">
            <label class="form-label d-block">Current Image</label>
            <img th:src="@{'/images/' + ${product.imageFileName}}"
                 width="150"
                 class="product-img">
        </div>

        <!-- Upload -->
        <div class="mb-4">
            <label class="form-label">Upload New Image</label>
            <input type="file" class="form-control" th:field="*{imageFile}">
        </div>

        <!-- Buttons -->
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-update">💾 Update Product</button>
            <a class="btn btn-outline-secondary btn-cancel" th:href="@{/products}">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
