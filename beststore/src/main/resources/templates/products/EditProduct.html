<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container">
    <div class="row">
        <div class="col-md-8 mx-auto rounded border p-4 m-4">

            <h2 class="text-center mb-5">Edit Product</h2>

            <!-- ✅ CORRECT FORM -->
            <form method="post"
                  enctype="multipart/form-data"
                  th:action="@{/products/edit/{id}(id=${product.id})}"
                  th:object="${productDto}">

                <!-- ID -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">ID</label>
                    <div class="col-sm-8">
                        <input readonly class="form-control-plaintext" th:value="${product.id}">
                    </div>
                </div>

                <!-- Name -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Name</label>
                    <div class="col-sm-8">
                        <input class="form-control" th:field="*{name}">
                        <p class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
                    </div>
                </div>

                <!-- Brand -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Brand</label>
                    <div class="col-sm-8">
                        <input class="form-control" th:field="*{brand}">
                        <p class="text-danger" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></p>
                    </div>
                </div>

                <!-- Category -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Category</label>
                    <div class="col-sm-8">
                        <select class="form-select" th:field="*{category}">
                            <option value="">-- Select Category --</option>
                            <option value="Phones">Phones</option>
                            <option value="Computers">Computers</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                        <p class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
                    </div>
                </div>

                <!-- Price -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Price</label>
                    <div class="col-sm-8">
                        <input class="form-control" type="number" th:field="*{price}">
                        <p class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></p>
                    </div>
                </div>

                <!-- Description -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Description</label>
                    <div class="col-sm-8">
                        <textarea class="form-control" th:field="*{description}"></textarea>
                    </div>
                </div>

                <!-- Image -->
                <div class="row mb-3">
                    <div class="offset-sm-4 col-sm-8">
                        <img th:src="@{'/images/' + ${product.imageFileName}}"
                             width="120">
                    </div>
                </div>

                <!-- Upload -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">New Image</label>
                    <div class="col-sm-8">
                        <input type="file" class="form-control" th:field="*{imageFile}">
                    </div>
                </div>

                <!-- Buttons -->
                <div class="row">
                    <div class="offset-sm-4 col-sm-4 d-grid">
                        <button type="submit" class="btn btn-primary">Update</button>
                    </div>

                    <div class="col-sm-4 d-grid">
                        <a class="btn btn-secondary" th:href="@{/products}">Cancel</a>
                    </div>
                </div>

            </form>

        </div>
    </div>
</div>
</body>
</html>
