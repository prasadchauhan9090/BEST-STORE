<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: #fff;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 700px;
        }

        h2 {
            font-weight: bold;
            color: #333;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn-custom {
            background: linear-gradient(45deg, #ff6a00, #ee0979);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 25px;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .btn-cancel {
            border-radius: 25px;
        }

        .form-label {
            font-weight: 600;
        }

        .error-text {
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card-box">

    <h2 class="text-center mb-4">➕ Create New Product</h2>

    <form method="post"
          enctype="multipart/form-data"
          th:action="@{/products/create}"
          th:object="${productDto}">

        <!-- Name -->
        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input class="form-control" th:field="*{name}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}"></div>
        </div>

        <!-- Brand -->
        <div class="mb-3">
            <label class="form-label">Brand</label>
            <input class="form-control" th:field="*{brand}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('brand')}"
                 th:errors="*{brand}"></div>
        </div>

        <!-- Category -->
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select class="form-select" th:field="*{category}">
                <option value="">-- Select Category --</option>
                <option value="Phones">Phones</option>
                <option value="Computers">Computers</option>
                <option value="Accessories">Accessories</option>
                <option value="Printers">Printers</option>
                <option value="Cameras">Cameras</option>
            </select>
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('category')}"
                 th:errors="*{category}"></div>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input type="number" class="form-control" th:field="*{price}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('price')}"
                 th:errors="*{price}"></div>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}"></div>
        </div>

        <!-- Image -->
        <div class="mb-4">
            <label class="form-label">Upload Image</label>
            <input type="file" class="form-control" th:field="*{imageFile}">
            <div class="text-danger error-text"
                 th:if="${#fields.hasErrors('imageFile')}"
                 th:errors="*{imageFile}"></div>
        </div>

        <!-- Buttons -->
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-custom">🚀 Save Product</button>
            <a class="btn btn-outline-secondary btn-cancel" th:href="@{/products}">Cancel</a>
        </div>

    </form>

</div>

</body>
</html>
