<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Styles -->
    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        h2 {
            font-weight: bold;
            color: #333;
        }

        .btn-create {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 25px;
            padding: 10px 20px;
            transition: 0.3s;
        }

        .btn-create:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        table {
            border-radius: 15px;
            overflow: hidden;
        }

        thead {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        tbody tr {
            transition: 0.3s;
        }

        tbody tr:hover {
            background-color: #f5f5f5;
            transform: scale(1.01);
        }

        .product-img {
            border-radius: 10px;
            transition: 0.3s;
        }

        .product-img:hover {
            transform: scale(1.1);
        }

        .btn-sm {
            border-radius: 20px;
            padding: 5px 12px;
        }

        .btn-edit {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
            border: none;
            color: white;
        }

        .btn-delete {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            border: none;
            color: white;
        }

        .btn-edit:hover, .btn-delete:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="card-box">

        <h2 class="text-center mb-4">📦 Product Dashboard</h2>

        <!-- CREATE BUTTON -->
        <div class="d-flex justify-content-end mb-3">
            <a class="btn btn-create" th:href="@{/products/create}">
                ➕ Create Product
            </a>
        </div>

        <!-- TABLE -->
        <div class="table-responsive">
            <table class="table table-hover text-center align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Image</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="product : ${products}">

                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.brand}"></td>
                    <td th:text="${product.category}"></td>
                    <td th:text="${product.price} + ' ₹'"></td>

                    <td>
                        <img th:if="${product.imageFileName != null}"
                             th:src="@{'/images/' + ${product.imageFileName}}"
                             width="70" height="70"
                             class="product-img">

                        <span th:if="${product.imageFileName == null}" class="text-muted">
                            No Image
                        </span>
                    </td>

                    <td th:text="${#dates.format(product.createdAt, 'yyyy-MM-dd')}"></td>

                    <td>
                        <a class="btn btn-edit btn-sm"
                           th:href="@{/products/edit/{id}(id=${product.id})}">
                            ✏️ Edit
                        </a>

                        <a class="btn btn-delete btn-sm"
                           th:href="@{/products/delete/{id}(id=${product.id})}"
                           onclick="return confirm('Delete this product?');">
                            🗑 Delete
                        </a>
                    </td>

                </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
