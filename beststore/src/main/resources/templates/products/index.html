<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-4">Product List</h2>

    <!-- CREATE BUTTON -->
    <div class="d-flex justify-content-between mb-3">
        <a class="btn btn-success" th:href="@{/products/create}">
            + Create Product
        </a>
    </div>

    <!-- TABLE -->
    <table class="table table-bordered table-hover text-center align-middle">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Brand</th>
            <th>Category</th>
            <th>Price</th>
            <th>Image</th>
            <th>Created Date</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="product : ${products}">

            <!-- ID -->
            <td th:text="${product.id}"></td>

            <!-- NAME -->
            <td th:text="${product.name}"></td>

            <!-- BRAND -->
            <td th:text="${product.brand}"></td>

            <!-- CATEGORY -->
            <td th:text="${product.category}"></td>

            <!-- PRICE -->
            <td th:text="${product.price} + ' ₹'"></td>

            <!-- IMAGE -->
            <td>
                <img th:if="${product.imageFileName != null}"
                     th:src="@{'/images/' + ${product.imageFileName}}"
                     width="80" height="80" class="rounded">

                <span th:if="${product.imageFileName == null}" class="text-muted">
                    No Image
                </span>
            </td>

            <!-- DATE -->
            <td th:text="${#dates.format(product.createdAt, 'yyyy-MM-dd')}"></td>

            <!-- ACTIONS -->
            <td style="white-space:nowrap">

                <!-- EDIT -->
                <a class="btn btn-primary btn-sm"
                   th:href="@{/products/edit/{id}(id=${product.id})}">
                    Edit
                </a>

                <!-- DELETE -->
                <a class="btn btn-danger btn-sm"
                   th:href="@{/products/delete/{id}(id=${product.id})}"
                   onclick="return confirm('Are you sure you want to delete this product?');">
                    Delete
                </a>

            </td>

        </tr>
        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
